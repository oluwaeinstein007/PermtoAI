services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: permito-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mcp:
    build: .
    container_name: permito-mcp
    command: pnpm start:http
    ports:
      - "3000:3000"
    environment:
      # Google Gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-3072}
      # Qdrant (override host to use internal Docker network)
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_KEY: ${QDRANT_KEY}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-permito_regulations}
      # MCP transport
      USE_HTTP: "true"
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      - qdrant
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: .
    container_name: permito-api
    command: pnpm api
    ports:
      - "4000:4000"
    environment:
      # Google Gemini
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_EMBEDDING_MODEL: ${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-3072}
      # Qdrant (override host to use internal Docker network)
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_KEY: ${QDRANT_KEY}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-permito_regulations}
      # REST API
      API_PORT: "4000"
    depends_on:
      - qdrant
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  qdrant_data:
