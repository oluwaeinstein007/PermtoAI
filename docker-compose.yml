services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: permito-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp:
    build: .
    container_name: permito-mcp
    command: pnpm start:http
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      USE_HTTP: "true"
      PORT: "3000"
      HOST: "0.0.0.0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  api:
    build: .
    container_name: permito-api
    command: pnpm api
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      API_PORT: "4000"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_data:
